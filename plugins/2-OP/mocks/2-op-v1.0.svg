<svg xmlns="http://www.w3.org/2000/svg" width="545" height="455" viewBox="0 0 545 455">
  <defs>
    <linearGradient id="panelOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.094"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.094"/>
    </linearGradient>
    <!-- Reusable knob tick pattern (relative to knob center 0,0).
         Sweep 225°→495° (1.25π→2.75π), 11 ticks, outer r=33, inner r=28. -->
    <g id="knobTicks">
      <!-- t=0.0  225°: sin=-0.707 cos=-0.707 -->
      <line x1="-19.8" y1="19.8"  x2="-23.3" y2="23.3"  stroke="#888" stroke-width="1"/>
      <!-- t=0.1  252°: sin=-0.951 cos=-0.309 -->
      <line x1="-26.6" y1="8.65"  x2="-31.4" y2="10.2"  stroke="#888" stroke-width="1"/>
      <!-- t=0.2  279°: sin=-0.988 cos=0.156 -->
      <line x1="-27.7" y1="-4.38" x2="-32.6" y2="-5.16" stroke="#888" stroke-width="1"/>
      <!-- t=0.3  306°: sin=-0.809 cos=0.588 -->
      <line x1="-22.7" y1="-16.5" x2="-26.7" y2="-19.4" stroke="#888" stroke-width="1"/>
      <!-- t=0.4  333°: sin=-0.454 cos=0.891 -->
      <line x1="-12.7" y1="-24.9" x2="-15.0" y2="-29.4" stroke="#888" stroke-width="1"/>
      <!-- t=0.5  360°: sin=0 cos=1 -->
      <line x1="0"     y1="-28"   x2="0"     y2="-33"   stroke="#888" stroke-width="1"/>
      <!-- t=0.6  387°: sin=0.454 cos=0.891 -->
      <line x1="12.7"  y1="-24.9" x2="15.0"  y2="-29.4" stroke="#888" stroke-width="1"/>
      <!-- t=0.7  414°: sin=0.809 cos=0.588 -->
      <line x1="22.7"  y1="-16.5" x2="26.7"  y2="-19.4" stroke="#888" stroke-width="1"/>
      <!-- t=0.8  441°: sin=0.988 cos=0.156 -->
      <line x1="27.7"  y1="-4.38" x2="32.6"  y2="-5.16" stroke="#888" stroke-width="1"/>
      <!-- t=0.9  468°: sin=0.951 cos=-0.309 -->
      <line x1="26.6"  y1="8.65"  x2="31.4"  y2="10.2"  stroke="#888" stroke-width="1"/>
      <!-- t=1.0  495°: sin=0.707 cos=-0.707 -->
      <line x1="19.8"  y1="19.8"  x2="23.3"  y2="23.3"  stroke="#888" stroke-width="1"/>
    </g>

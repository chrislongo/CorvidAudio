  <text x="210" y="315.5" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#444444" text-anchor="middle">PING</text>

  <!-- ── Knobs (cy=372, r=26, ticks outer r=33 inner r=28) ─────────
       Indicator: inner r=10, outer r=22
       Angles: Attack~1.325π, Decay=2.0π(12-o-clock), Color=1.25π(SW), Output~2.3π(NE) -->

  <!-- ATTACK (cx=83) — default ~0.05 norm, angle=1.325π, sin=-0.853 cos=-0.523 -->
  <g transform="translate(83,372)">
    <use href="#knobTicks"/>
    <circle r="26" fill="#111111"/>
    <line x1="-8.53" y1="5.23" x2="-18.77" y2="11.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <text x="83" y="423" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#444444" text-anchor="middle">ATTACK</text>

  <!-- DECAY (cx=210) — default 0.5 norm, angle=2π (12 o'clock), sin=0 cos=1 -->

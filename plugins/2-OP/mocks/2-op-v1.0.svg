  <rect x="14" y="296" width="517" height="149" rx="8" fill="none" stroke="#888888" stroke-width="1.5"/>
  <text x="28" y="318" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#555555">LPG + OUTPUT</text>

  <!-- PING pill — outlined (gate mode = default off) -->

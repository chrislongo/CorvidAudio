  <line x1="231" y1="212" x2="259" y2="212" stroke="#ffffff" stroke-width="1"/>

  <!-- Labels -->
  <text x="55"  y="234" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">RATIO</text>
  <text x="118" y="234" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"

<svg width="300" height="340" viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel-overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.094"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.094"/>
    </linearGradient>
  </defs>

  <!-- Panel background -->
  <rect width="300" height="340" fill="#d8d8d8"/>
  <rect width="300" height="340" fill="url(#panel-overlay)"/>

  <!-- Plugin title -->
  <text x="150" y="32" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="700" letter-spacing="0.5" fill="#222222">2-OP</text>

  <!--
    Slider columns: 55, 118, 182, 245
    Track: y=52–212 (160px), 4px wide
    Ticks: y = 52 + i*(160/11) for i=1..10
      ≈ 66.5, 81.1, 95.6, 110.2, 124.7, 139.3, 153.8, 168.4, 182.9, 197.5
    Tick flanks: left (col-9 → col-3), right (col+3 → col+9)
  -->

  <!-- ═══ RATIO (x=55) ═══ -->
  <g stroke="#888888" stroke-width="1">
    <line x1="46" x2="52" y1="66.5"  y2="66.5"/>  <line x1="58" x2="64" y1="66.5"  y2="66.5"/>
    <line x1="46" x2="52" y1="81.1"  y2="81.1"/>  <line x1="58" x2="64" y1="81.1"  y2="81.1"/>
    <line x1="46" x2="52" y1="95.6"  y2="95.6"/>  <line x1="58" x2="64" y1="95.6"  y2="95.6"/>
    <line x1="46" x2="52" y1="110.2" y2="110.2"/> <line x1="58" x2="64" y1="110.2" y2="110.2"/>
    <line x1="46" x2="52" y1="124.7" y2="124.7"/> <line x1="58" x2="64" y1="124.7" y2="124.7"/>
    <line x1="46" x2="52" y1="139.3" y2="139.3"/> <line x1="58" x2="64" y1="139.3" y2="139.3"/>
    <line x1="46" x2="52" y1="153.8" y2="153.8"/> <line x1="58" x2="64" y1="153.8" y2="153.8"/>
    <line x1="46" x2="52" y1="168.4" y2="168.4"/> <line x1="58" x2="64" y1="168.4" y2="168.4"/>
    <line x1="46" x2="52" y1="182.9" y2="182.9"/> <line x1="58" x2="64" y1="182.9" y2="182.9"/>
    <line x1="46" x2="52" y1="197.5" y2="197.5"/> <line x1="58" x2="64" y1="197.5" y2="197.5"/>
  </g>
  <rect x="53" y="52" width="4" height="160" fill="#2a2a2a"/>
  <!-- thumb value=0.50 → yc=132 -->
  <rect x="41" y="127" width="28" height="10" fill="#111111"/>
  <line x1="41" y1="132" x2="69" y2="132" stroke="#ffffff" stroke-width="1"/>

  <!-- ═══ INDEX (x=118) ═══ -->
  <g stroke="#888888" stroke-width="1">
    <line x1="109" x2="115" y1="66.5"  y2="66.5"/>  <line x1="121" x2="127" y1="66.5"  y2="66.5"/>
    <line x1="109" x2="115" y1="81.1"  y2="81.1"/>  <line x1="121" x2="127" y1="81.1"  y2="81.1"/>
    <line x1="109" x2="115" y1="95.6"  y2="95.6"/>  <line x1="121" x2="127" y1="95.6"  y2="95.6"/>
    <line x1="109" x2="115" y1="110.2" y2="110.2"/> <line x1="121" x2="127" y1="110.2" y2="110.2"/>
    <line x1="109" x2="115" y1="124.7" y2="124.7"/> <line x1="121" x2="127" y1="124.7" y2="124.7"/>
    <line x1="109" x2="115" y1="139.3" y2="139.3"/> <line x1="121" x2="127" y1="139.3" y2="139.3"/>
    <line x1="109" x2="115" y1="153.8" y2="153.8"/> <line x1="121" x2="127" y1="153.8" y2="153.8"/>
    <line x1="109" x2="115" y1="168.4" y2="168.4"/> <line x1="121" x2="127" y1="168.4" y2="168.4"/>
    <line x1="109" x2="115" y1="182.9" y2="182.9"/> <line x1="121" x2="127" y1="182.9" y2="182.9"/>
    <line x1="109" x2="115" y1="197.5" y2="197.5"/> <line x1="121" x2="127" y1="197.5" y2="197.5"/>
  </g>
  <rect x="116" y="52" width="4" height="160" fill="#2a2a2a"/>
  <!-- thumb value=0.30 → yc=164 -->
  <rect x="104" y="159" width="28" height="10" fill="#111111"/>
  <line x1="104" y1="164" x2="132" y2="164" stroke="#ffffff" stroke-width="1"/>

  <!-- ═══ FDBK (x=182) ═══ -->
  <g stroke="#888888" stroke-width="1">
    <line x1="173" x2="179" y1="66.5"  y2="66.5"/>  <line x1="185" x2="191" y1="66.5"  y2="66.5"/>
    <line x1="173" x2="179" y1="81.1"  y2="81.1"/>  <line x1="185" x2="191" y1="81.1"  y2="81.1"/>
    <line x1="173" x2="179" y1="95.6"  y2="95.6"/>  <line x1="185" x2="191" y1="95.6"  y2="95.6"/>
    <line x1="173" x2="179" y1="110.2" y2="110.2"/> <line x1="185" x2="191" y1="110.2" y2="110.2"/>
    <line x1="173" x2="179" y1="124.7" y2="124.7"/> <line x1="185" x2="191" y1="124.7" y2="124.7"/>
    <line x1="173" x2="179" y1="139.3" y2="139.3"/> <line x1="185" x2="191" y1="139.3" y2="139.3"/>
    <line x1="173" x2="179" y1="153.8" y2="153.8"/> <line x1="185" x2="191" y1="153.8" y2="153.8"/>
    <line x1="173" x2="179" y1="168.4" y2="168.4"/> <line x1="185" x2="191" y1="168.4" y2="168.4"/>
    <line x1="173" x2="179" y1="182.9" y2="182.9"/> <line x1="185" x2="191" y1="182.9" y2="182.9"/>
    <line x1="173" x2="179" y1="197.5" y2="197.5"/> <line x1="185" x2="191" y1="197.5" y2="197.5"/>
  </g>
  <rect x="180" y="52" width="4" height="160" fill="#2a2a2a"/>
  <!-- thumb value=0.50 → yc=132 -->
  <rect x="168" y="127" width="28" height="10" fill="#111111"/>
  <line x1="168" y1="132" x2="196" y2="132" stroke="#ffffff" stroke-width="1"/>

  <!-- ═══ SUB (x=245) ═══ -->
  <g stroke="#888888" stroke-width="1">
    <line x1="236" x2="242" y1="66.5"  y2="66.5"/>  <line x1="248" x2="254" y1="66.5"  y2="66.5"/>
    <line x1="236" x2="242" y1="81.1"  y2="81.1"/>  <line x1="248" x2="254" y1="81.1"  y2="81.1"/>
    <line x1="236" x2="242" y1="95.6"  y2="95.6"/>  <line x1="248" x2="254" y1="95.6"  y2="95.6"/>
    <line x1="236" x2="242" y1="110.2" y2="110.2"/> <line x1="248" x2="254" y1="110.2" y2="110.2"/>
    <line x1="236" x2="242" y1="124.7" y2="124.7"/> <line x1="248" x2="254" y1="124.7" y2="124.7"/>
    <line x1="236" x2="242" y1="139.3" y2="139.3"/> <line x1="248" x2="254" y1="139.3" y2="139.3"/>
    <line x1="236" x2="242" y1="153.8" y2="153.8"/> <line x1="248" x2="254" y1="153.8" y2="153.8"/>
    <line x1="236" x2="242" y1="168.4" y2="168.4"/> <line x1="248" x2="254" y1="168.4" y2="168.4"/>
    <line x1="236" x2="242" y1="182.9" y2="182.9"/> <line x1="248" x2="254" y1="182.9" y2="182.9"/>
    <line x1="236" x2="242" y1="197.5" y2="197.5"/> <line x1="248" x2="254" y1="197.5" y2="197.5"/>
  </g>
  <rect x="243" y="52" width="4" height="160" fill="#2a2a2a"/>
  <!-- thumb value=0.00 → yc=212 -->
  <rect x="231" y="207" width="28" height="10" fill="#111111"/>
  <line x1="231" y1="212" x2="259" y2="212" stroke="#ffffff" stroke-width="1"/>

  <!-- Slider labels -->
  <text x="55"  y="228" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">RATIO</text>
  <text x="118" y="228" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">INDEX</text>
  <text x="182" y="228" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">FDBK</text>
  <text x="245" y="228" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">SUB</text>

  <!-- Slider values -->
  <text x="55"  y="242" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.50</text>
  <text x="118" y="242" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.30</text>
  <text x="182" y="242" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.50</text>
  <text x="245" y="242" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.00</text>

  <!-- Section separator -->
  <line x1="20" y1="257" x2="280" y2="257" stroke="#b8b8b8" stroke-width="0.75"/>

  <!--
    ADSR knobs — same 4 columns, centred at y=285, radius=16.
    Indicator: white line from r=5 to r=12, at default-value angle.
    Convention: angle 0° = 12 o'clock, clockwise positive.
    Range: −135° (min) to +135° (max), sweep = 270°.
    angle = −135 + proportion × 270

    ATK  0.008s in [0.001,2.0]:  p≈0.003  → angle ≈ −134.2°
    DCY  0.30s  in [0.001,4.0]:  p≈0.075  → angle ≈ −114.8°
    SUS  0.80   in [0,1]:        p=0.800  → angle =   81.0°
    REL  0.20s  in [0.001,4.0]:  p≈0.050  → angle ≈ −121.5°

    SVG endpoint: x = cx + sin(a_rad)·r,  y = cy − cos(a_rad)·r
  -->

  <!-- ATK knob (cx=55, cy=285) — angle ≈ −134° (near minimum) -->
  <circle cx="55" cy="285" r="16" fill="#111111"/>
  <line x1="51.4" y1="288.5" x2="46.4" y2="293.3" stroke="#ffffff" stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- DCY knob (cx=118, cy=285) — angle ≈ −115° (low) -->
  <circle cx="118" cy="285" r="16" fill="#111111"/>
  <line x1="113.5" y1="287.1" x2="107.1" y2="290.1" stroke="#ffffff" stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- SUS knob (cx=182, cy=285) — angle = 81° (high) -->
  <circle cx="182" cy="285" r="16" fill="#111111"/>
  <line x1="186.9" y1="284.2" x2="193.9" y2="283.1" stroke="#ffffff" stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- REL knob (cx=245, cy=285) — angle ≈ −121.5° (low) -->
  <circle cx="245" cy="285" r="16" fill="#111111"/>
  <line x1="240.7" y1="287.6" x2="234.8" y2="291.3" stroke="#ffffff" stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- Knob labels -->
  <text x="55"  y="314" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">ATK</text>
  <text x="118" y="314" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">DCY</text>
  <text x="182" y="314" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">SUS</text>
  <text x="245" y="314" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" font-weight="700" letter-spacing="0.3" fill="#444444">REL</text>

  <!-- Knob values -->
  <text x="55"  y="328" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.01</text>
  <text x="118" y="328" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.30</text>
  <text x="182" y="328" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.80</text>
  <text x="245" y="328" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-size="10" fill="#555555">0.20</text>

</svg>
